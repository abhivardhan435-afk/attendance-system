<!DOCTYPE html>
<html>
<head>
<title>Dashboard</title>

<style>

body{
font-family: Arial;
background:#f4f6f9;
}

.header{
background:#007BFF;
color:white;
padding:15px;
text-align:center;
}

.container{
padding:20px;
}

.card{
background:white;
padding:20px;
margin:10px;
display:inline-block;
width:200px;
text-align:center;
border-radius:8px;
box-shadow:0px 0px 5px gray;
}

button{
padding:10px;
background:#007BFF;
color:white;
border:none;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
<h2>Attendance Dashboard</h2>
</div>

<div class="container">

<div class="card">
<h3>Add Students</h3>
<button>Add</button>
</div>

<div class="card">
<h3>Mark Attendance</h3>
<button>Mark</button>
</div>

<div class="card">
<h3>View Reports</h3>
<button>View</button>
</div>

<div class="card">
<h3>Logout</h3>
<button onclick="logout()">Logout</button>
</div>

</div>

<script>

function logout(){
window.location="login.html";
}

</script>

</body>
</html>
